<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Paper sheet with a folded top-right corner -->
  <path d="M 6 4 L 21 4 L 27 10 L 27 28 L 6 28 Z"
        fill="#f3ead2"
        stroke="#2a2218"
        stroke-width="1.6"
        stroke-linejoin="round"/>
  <!-- Fold crease -->
  <path d="M 21 4 L 21 10 L 27 10"
        fill="none"
        stroke="#2a2218"
        stroke-width="1.4"
        stroke-linejoin="round"/>
  <!-- Three lines of text -->
  <line x1="10" y1="15" x2="22" y2="15" stroke="#2a2218" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="10" y1="19" x2="22" y2="19" stroke="#2a2218" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="10" y1="23" x2="18" y2="23" stroke="#2a2218" stroke-width="1.4" stroke-linecap="round"/>
</svg>
